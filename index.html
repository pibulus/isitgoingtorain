<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is it going to rain?</title>
    <meta name="description" content="Just tell me if it's going to rain. Yes, no, or maybe.">

    <!-- Open Graph -->
    <meta property="og:title" content="Is it going to rain?">
    <meta property="og:description" content="Just tell me if it's going to rain. Yes, no, or maybe.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://isitgoingtorain.app">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Is it going to rain?">
    <meta name="twitter:description" content="Just tell me if it's going to rain. Yes, no, or maybe.">

    <!-- Google Fonts - Chunky Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --card-radius: 28px;
            --blur: 28px;
            --shadow-soft: 0 30px 80px rgba(10, 20, 40, 0.25);
            --text-dark: #0f172a;
            --text-light: rgba(255, 255, 255, 0.92);
            --cta-gradient: linear-gradient(120deg, #8c5bff 0%, #c946ff 50%, #ff89d6 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8e7ff 0%, #dff5ff 50%, #e7f0ff 100%);
            transition: background 0.9s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
            padding: 3rem 1.5rem;
            color: var(--text-light);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.18) 1px, transparent 1px);
            background-size: 120px 120px;
            opacity: 0.45;
            pointer-events: none;
        }

        body.idle {
            background: linear-gradient(135deg, #fdf1ff 0%, #dbe8ff 50%, #e0ffe7 100%);
        }

        body.loading {
            background: linear-gradient(135deg, #d7f2ff 0%, #d0d8ff 50%, #f0d7ff 100%);
        }

        body.yes {
            background: linear-gradient(135deg, #120c2b 0%, #5b21b6 40%, #f472b6 100%);
        }

        body.maybe {
            background: linear-gradient(135deg, #e0f7fa 0%, #7bd3ea 45%, #5f5ae0 100%);
        }

        body.no {
            background: linear-gradient(135deg, #fff8f1 0%, #ffd6c4 45%, #ff9a8b 100%);
        }

        .brand-anchor {
            position: fixed;
            top: 2rem;
            left: 2rem;
            padding: 0.65rem 1.25rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.65);
            color: #0f172a;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border: 1px solid rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.15);
            display: flex;
            gap: 0.35rem;
            align-items: center;
            z-index: 10;
        }

        .floating-drops {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .floating-drops span {
            position: absolute;
            width: clamp(24px, 3vw, 46px);
            aspect-ratio: 1 / 1.6;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50% 50% 40% 40%;
            filter: blur(0.3px);
            animation: drift 12s ease-in-out infinite;
        }

        .floating-drops .drop-1 { top: 12%; left: 15%; animation-delay: 0s; }
        .floating-drops .drop-2 { top: 30%; right: 10%; animation-duration: 15s; }
        .floating-drops .drop-3 { bottom: 18%; left: 25%; animation-duration: 10s; }
        .floating-drops .drop-4 { bottom: 30%; right: 18%; animation-delay: 0.6s; }

        .container {
            text-align: center;
            width: 100%;
            max-width: 720px;
            position: relative;
            z-index: 2;
        }

        .card {
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: var(--card-radius);
            padding: clamp(2rem, 4vw, 3.5rem);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(var(--blur));
            color: var(--text-light);
        }

        .eyebrow {
            font-size: 0.95rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 1rem;
        }

        .hero-title {
            font-size: clamp(2.8rem, 6vw, 4.8rem);
            letter-spacing: -0.02em;
            line-height: 1.05;
            margin-bottom: 1rem;
        }

        .hero-copy {
            font-size: clamp(1.05rem, 2.5vw, 1.3rem);
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
            margin-bottom: 2.5rem;
        }

        .cta-button {
            border: none;
            border-radius: 999px;
            padding: 1.1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: white;
            background-image: var(--cta-gradient);
            box-shadow: 0 25px 45px rgba(172, 103, 255, 0.35);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
            min-height: 56px;
        }

        .cta-button:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 30px 60px rgba(172, 103, 255, 0.45);
        }

        .cta-button:active {
            transform: translateY(0px) scale(0.98);
        }

        .cta-button:focus-visible {
            outline: 3px solid rgba(255, 255, 255, 0.7);
            outline-offset: 4px;
        }

        .loading-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .loading-orb {
            width: clamp(120px, 30vw, 200px);
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.2));
            position: relative;
            animation: orbPulse 2.5s ease-in-out infinite;
            box-shadow: inset 0 0 80px rgba(255, 255, 255, 0.6), 0 20px 50px rgba(15, 23, 42, 0.2);
        }

        .loading-orb::after {
            content: "";
            position: absolute;
            inset: 25%;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.5);
            animation: spin 6s linear infinite;
        }

        .loading-text {
            font-size: clamp(1.3rem, 3vw, 2rem);
            font-weight: 700;
        }

        .loading-sub {
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
        }

        .answer {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            text-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
            opacity: 0;
            transform: scale(0.9);
            animation: answerPop 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .location {
            font-size: clamp(1rem, 2.4vw, 1.5rem);
            margin-top: 1.25rem;
            font-weight: 600;
        }

        .details {
            margin-top: 1.5rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .detail-main {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .detail-secondary {
            margin-top: 0.5rem;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.75);
        }

        .refresh {
            background: rgba(255, 255, 255, 0.9);
            color: #0f172a;
            border: none;
            border-radius: 16px;
            padding: 0.95rem 2rem;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
            min-height: 52px;
        }

        .refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.25);
        }

        .refresh:focus-visible {
            outline: 3px solid rgba(15, 23, 42, 0.6);
            outline-offset: 4px;
        }

        .error-card .error {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
        }

        .footer-chip {
            margin-top: 2.5rem;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.75);
            text-align: center;
            z-index: 2;
        }

        .footer-chip strong {
            font-weight: 700;
        }

        @keyframes drift {
            0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.65; }
            50% { transform: translate3d(0, -25px, 0) scale(1.1); opacity: 0.5; }
            100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.65; }
        }

        @keyframes orbPulse {
            0%, 100% { transform: scale(0.9); }
            50% { transform: scale(1.05); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes answerPop {
            50% { opacity: 1; transform: scale(1.08); }
            100% { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 768px) {
            body {
                padding: 2rem 1.25rem 3rem;
            }

            .brand-anchor {
                position: static;
                margin-bottom: 1.5rem;
                justify-content: center;
            }

            .footer-chip {
                font-size: 0.8rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="idle">
    <div class="brand-anchor">isitgoingtorain.app <span aria-hidden="true">☂️</span></div>
    <div class="floating-drops" aria-hidden="true">
        <span class="drop-1"></span>
        <span class="drop-2"></span>
        <span class="drop-3"></span>
        <span class="drop-4"></span>
    </div>
    <div class="container">
        <div id="content"></div>
    </div>
    <footer class="footer-chip">
        Powered by <strong>wttr.in</strong> + <strong>ipinfo</strong> · Built for humans, not forecasts
    </footer>

    <script>
        const RAIN_THRESHOLD = {
            YES: 60,
            MAYBE_HIGH: 30
        };

        const content = document.getElementById('content');
        let isChecking = false;

        function renderIntro() {
            document.body.className = 'idle';
            content.innerHTML = `
                <div class="card hero-card">
                    <p class="eyebrow">One vibe check away</p>
                    <h1 class="hero-title">Is it going to rain?</h1>
                    <p class="hero-copy">
                        We sniff your sky using wttr.in + ipinfo, then give you a single, definitive answer.
                        One tap. One vibe check. Zero bullshit.
                    </p>
                    <button class="cta-button" id="checkButton">
                        <span>Check the sky</span>
                        <span aria-hidden="true">✨</span>
                    </button>
                </div>
            `;

            const button = document.getElementById('checkButton');
            button.addEventListener('click', startCheck, { once: true });
        }

        function showLoading() {
            document.body.className = 'loading';
            content.innerHTML = `
                <div class="card loading-card">
                    <div class="loading-orb" aria-hidden="true"></div>
                    <p class="loading-text">Sniffing the clouds...</p>
                    <p class="loading-sub">Hold tight babe—dialing up the sky gods.</p>
                </div>
            `;
        }

        async function getLocation() {
            const response = await fetch('https://ipinfo.io/json?token=demo');
            const data = await response.json();
            return {
                city: data.city || 'Unknown',
                country: data.country || '',
                lat: data.loc ? data.loc.split(',')[0] : null,
                lon: data.loc ? data.loc.split(',')[1] : null
            };
        }

        async function getWeather(city) {
            const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
            const data = await response.json();
            const current = data.current_condition[0];
            const today = data.weather[0];
            const precipChance = parseInt(current.precipMM || 0, 10) > 0
                ? parseInt(current.humidity || 0, 10)
                : parseInt(today.hourly[0].chanceofrain || 0, 10);

            return {
                precipChance,
                condition: current.weatherDesc[0].value,
                temp: current.temp_C
            };
        }

        function determineAnswer(precipChance) {
            if (precipChance >= RAIN_THRESHOLD.YES) {
                return 'YES';
            } else if (precipChance >= RAIN_THRESHOLD.MAYBE_HIGH) {
                return 'MAYBE';
            }
            return 'NO';
        }

        function renderAnswer(answer, location, weather) {
            document.body.className = answer.toLowerCase();

            const emoji = answer === 'YES' ? '☔' : answer === 'MAYBE' ? '🌥️' : '🌞';
            const vibeCopy = {
                YES: 'Grab the cutest umbrella you own. Storm energy is on deck.',
                MAYBE: 'Keep it close. Clouds are gossiping and could spill.',
                NO: 'Sun is clocked in. Go live your life, no rain tax today.'
            }[answer];

            content.innerHTML = `
                <div class="card answer-card">
                    <p class="eyebrow answer-label">Sky verdict</p>
                    <div class="answer">${emoji} ${answer}</div>
                    <p class="location">📍 ${location.city || 'Unknown'}${location.country ? ', ' + location.country : ''}</p>
                    <div class="details">
                        <p class="detail-main">${weather.precipChance}% chance · ${weather.condition} · ${weather.temp}°C</p>
                        <p class="detail-secondary">${vibeCopy}</p>
                    </div>
                    <button class="refresh" id="againButton">Check again</button>
                </div>
            `;

            document.getElementById('againButton').addEventListener('click', renderIntro);
        }

        function showError(message) {
            document.body.className = 'idle';
            content.innerHTML = `
                <div class="card error-card">
                    <div class="error">${message}</div>
                    <button class="refresh" id="retryButton">Try again</button>
                </div>
            `;
            document.getElementById('retryButton').addEventListener('click', renderIntro);
        }

        async function startCheck() {
            if (isChecking) return;
            isChecking = true;
            showLoading();

            try {
                const location = await getLocation();
                if (!location.city) {
                    showError('We could not detect your location. Pop VPN off and try again.');
                    return;
                }

                const weather = await getWeather(location.city);
                const answer = determineAnswer(weather.precipChance);
                renderAnswer(answer, location, weather);
            } catch (error) {
                console.error('Error:', error);
                showError('Something blew away in the wind. Try again?');
            } finally {
                isChecking = false;
            }
        }

        renderIntro();
    </script>
</body>
</html>
