<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is it going to rain?</title>
    <meta name="description" content="Just tell me if it's going to rain. Yes, no, or maybe.">

    <!-- Open Graph -->
    <meta property="og:title" content="Is it going to rain?">
    <meta property="og:description" content="Just tell me if it's going to rain. Yes, no, or maybe.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://isitgoingtorain.app">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Is it going to rain?">
    <meta name="twitter:description" content="Just tell me if it's going to rain. Yes, no, or maybe.">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.8s ease;
            overflow: hidden;
        }

        /* Answer states */
        body.yes {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body.no {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        body.maybe {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        body.loading {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .answer {
            font-size: 15vw;
            font-weight: 900;
            color: white;
            text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.2);
            margin-bottom: 2rem;
            line-height: 1;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .answer.show {
            opacity: 1;
            transform: scale(1);
        }

        .location {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 1rem;
            opacity: 0;
            transition: opacity 0.5s ease 0.3s;
        }

        .location.show {
            opacity: 1;
        }

        .details {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
            opacity: 0;
            transition: opacity 0.5s ease 0.5s;
        }

        .details.show {
            opacity: 1;
        }

        .refresh {
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid white;
            color: white;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.5s ease 0.7s;
        }

        .refresh.show {
            opacity: 1;
        }

        .refresh:hover {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.2);
        }

        .refresh:active {
            transform: translateY(0);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
        }

        .loading-text {
            font-size: 2rem;
            color: white;
            font-weight: 700;
        }

        .error {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .answer {
                font-size: 20vw;
            }
        }
    </style>
</head>
<body class="loading">
    <div class="container">
        <div id="content">
            <div class="loading-text">Checking the sky...</div>
        </div>
    </div>

    <script>
        // ===================================================================
        // CONFIG
        // ===================================================================

        const RAIN_THRESHOLD = {
            YES: 60,        // 60%+ chance = YES
            MAYBE_HIGH: 30, // 30-60% = MAYBE
            NO: 30          // <30% = NO
        };

        // ===================================================================
        // GET LOCATION FROM IP
        // ===================================================================

        async function getLocation() {
            const response = await fetch('https://ipinfo.io/json?token=demo');
            const data = await response.json();
            return {
                city: data.city || 'Unknown',
                country: data.country || '',
                lat: data.loc ? data.loc.split(',')[0] : null,
                lon: data.loc ? data.loc.split(',')[1] : null
            };
        }

        // ===================================================================
        // GET WEATHER (using wttr.in - no API key needed!)
        // ===================================================================

        async function getWeather(city) {
            // wttr.in returns format: %C (condition) %p (precipitation)
            const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
            const data = await response.json();

            // Get current and next few hours
            const current = data.current_condition[0];
            const today = data.weather[0];

            // Check precipitation probability
            const precipChance = parseInt(current.precipMM || 0) > 0 ?
                parseInt(current.humidity || 0) :
                parseInt(today.hourly[0].chanceofrain || 0);

            return {
                precipChance,
                condition: current.weatherDesc[0].value,
                temp: current.temp_C
            };
        }

        // ===================================================================
        // DETERMINE ANSWER
        // ===================================================================

        function determineAnswer(precipChance) {
            if (precipChance >= RAIN_THRESHOLD.YES) {
                return 'YES';
            } else if (precipChance >= RAIN_THRESHOLD.MAYBE_HIGH) {
                return 'MAYBE';
            } else {
                return 'NO';
            }
        }

        // ===================================================================
        // RENDER ANSWER
        // ===================================================================

        function renderAnswer(answer, location, weather) {
            const container = document.getElementById('content');
            const body = document.body;

            // Set body class for gradient
            body.className = answer.toLowerCase();

            // Build details text
            let details = `${weather.precipChance}% chance of rain`;
            if (answer === 'MAYBE') {
                details += ' · Could go either way';
            } else if (answer === 'YES') {
                details += ' · Bring an umbrella';
            } else {
                details += ' · You\'re good';
            }

            // Render
            container.innerHTML = `
                <div class="answer">${answer}</div>
                <div class="location">${location.city}${location.country ? ', ' + location.country : ''}</div>
                <div class="details">${details}</div>
                <button class="refresh" onclick="location.reload()">Check Again</button>
            `;

            // Trigger animations
            requestAnimationFrame(() => {
                document.querySelector('.answer').classList.add('show');
                document.querySelector('.location').classList.add('show');
                document.querySelector('.details').classList.add('show');
                document.querySelector('.refresh').classList.add('show');
            });
        }

        // ===================================================================
        // ERROR HANDLING
        // ===================================================================

        function showError(message) {
            const container = document.getElementById('content');
            container.innerHTML = `
                <div class="error">${message}</div>
                <button class="refresh" onclick="location.reload()">Try Again</button>
            `;
            requestAnimationFrame(() => {
                document.querySelector('.refresh').classList.add('show');
            });
        }

        // ===================================================================
        // MAIN
        // ===================================================================

        async function init() {
            try {
                // Get location
                const location = await getLocation();

                if (!location.city) {
                    showError('Could not detect your location');
                    return;
                }

                // Get weather
                const weather = await getWeather(location.city);

                // Determine answer
                const answer = determineAnswer(weather.precipChance);

                // Render
                renderAnswer(answer, location, weather);

            } catch (error) {
                console.error('Error:', error);
                showError('Something went wrong. Try again?');
            }
        }

        // Run on load
        init();
    </script>
</body>
</html>
