<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is it going to rain?</title>
    <meta name="description" content="Just tell me if it's going to rain. One tap, one answer.">

    <meta property="og:title" content="Is it going to rain?">
    <meta property="og:description" content="Just tell me if it's going to rain. One tap, one answer.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://isitgoingtorain.app">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Is it going to rain?">
    <meta name="twitter:description" content="Just tell me if it's going to rain. One tap, one answer.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #111322;
            --ink-soft: rgba(17, 19, 34, 0.7);
            --ink-muted: rgba(17, 19, 34, 0.55);
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(17, 19, 34, 0.08);
            --cta-gradient: linear-gradient(135deg, #FF6B6B 0%, #FF5C8A 50%, #FFD93D 100%);
            --cta-gradient-hover: linear-gradient(135deg, #FF4757 0%, #FF3D7F 50%, #FFC93C 100%);
            --bg-gradient: linear-gradient(135deg, #FFE9D6, #FFF8E7, #E3F9FF, #FFE5E5);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Sora', 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: auroraShift 32s ease-in-out infinite;
            transition: background 1s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
            padding: clamp(2rem, 5vw, 3rem) clamp(1.5rem, 4vw, 3rem);
            color: var(--ink);
        }

        body.idle {
            --bg-gradient: linear-gradient(135deg, #FFE9D6, #FFF8E7, #E3F9FF, #FFE5E5);
        }

        body.loading {
            --bg-gradient: linear-gradient(135deg, #FFD93D, #FFE9D6, #00D9FF, #FFF8E7);
        }

        body.yes {
            --bg-gradient: linear-gradient(135deg, #00C2FF, #4ECDC4, #FF6B6B, #FF5C8A);
        }

        body.maybe {
            --bg-gradient: linear-gradient(135deg, #FFF8E7, #FFD93D, #00D9FF, #95E1D3);
        }

        body.no {
            --bg-gradient: linear-gradient(135deg, #FFD93D, #FFC93C, #FF6B6B, #FFAA00);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.35) 1px, transparent 1px);
            background-size: 140px 140px;
            opacity: 0.5;
            pointer-events: none;
            z-index: -1;
        }

        body::after {
            content: "";
            position: fixed;
            inset: -15%;
            background: conic-gradient(from 160deg, #FFD93D, #00D9FF, #FF6B6B, #95E1D3, #FFD93D);
            animation: gradientShift 35s ease-in-out infinite;
            filter: blur(70px);
            opacity: 0.6;
            pointer-events: none;
            z-index: -2;
        }

        .floating-drops {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .floating-drops span {
            position: absolute;
            width: clamp(28px, 4vw, 60px);
            aspect-ratio: 1 / 1.5;
            background: rgba(255, 211, 61, 0.25);
            border-radius: 46% 54% 52% 48%;
            filter: blur(0.6px);
            animation: drift 14s ease-in-out infinite;
        }

        .floating-drops .drop-1 { top: 18%; left: 12%; animation-delay: 0s; background: rgba(255, 211, 61, 0.25); }
        .floating-drops .drop-2 { top: 32%; right: 8%; animation-duration: 18s; background: rgba(0, 217, 255, 0.2); }
        .floating-drops .drop-3 { bottom: 24%; left: 24%; animation-duration: 12s; background: rgba(255, 107, 107, 0.2); }
        .floating-drops .drop-4 { bottom: 30%; right: 16%; animation-delay: 0.7s; background: rgba(78, 205, 196, 0.22); }

        .container {
            width: min(640px, 100%);
            position: relative;
            z-index: 2;
        }

        #content {
            width: 100%;
        }

        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid rgba(17, 19, 34, 0.1);
            border-radius: 34px;
            padding: clamp(2.25rem, 5vw, 3.75rem);
            box-shadow: 0 25px 60px rgba(255, 107, 107, 0.12), 0 15px 40px rgba(0, 217, 255, 0.08);
            backdrop-filter: blur(35px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 1.5rem;
            min-height: 480px;
            max-width: 660px;
            width: 100%;
            overflow: hidden;
            transition: transform 0.6s ease;
        }

        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at 12% 0%, rgba(255, 255, 255, 0.5), transparent 55%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.01);
        }

        .card:hover::after {
            opacity: 1;
        }

        .hero-card {
            text-align: left;
            animation: heroBreathe 9s ease-in-out infinite;
            gap: 1.2rem;
        }

        .hero-title {
            font-family: 'Space Grotesk', 'Sora', sans-serif;
            font-size: clamp(3.6rem, 7vw, 5.4rem);
            line-height: 1;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
        }

        .hero-copy {
            font-size: clamp(1.15rem, 2.7vw, 1.4rem);
            color: var(--ink-soft);
            line-height: 1.55;
        }

        .cta-button {
            --magnet-x: 0px;
            --magnet-y: 0px;
            --cta-scale: 1;
            --cta-translate-y: 0px;
            position: relative;
            border: none;
            border-radius: 999px;
            padding: 1.15rem 2.6rem;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: white;
            background-image: var(--cta-gradient);
            background-size: 180% 180%;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            box-shadow: none;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, background-position 0.3s ease;
            min-height: 56px;
            width: fit-content;
            transform: translate3d(var(--magnet-x), calc(var(--magnet-y) + var(--cta-translate-y)), 0) scale(var(--cta-scale));
        }

        .cta-button::after {
            content: "";
            position: absolute;
            inset: 3px;
            border-radius: inherit;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.45), transparent 60%);
            opacity: 0.75;
            pointer-events: none;
        }

        .cta-button:hover {
            --cta-scale: 1.02;
            --cta-translate-y: -5px;
            background-image: var(--cta-gradient-hover);
            box-shadow: 0 40px 80px rgba(255, 107, 107, 0.35);
        }

        .cta-button:active {
            --cta-scale: 0.99;
            --cta-translate-y: -1px;
        }

        .cta-button:focus-visible {
            outline: 3px solid rgba(255, 255, 255, 0.9);
            outline-offset: 4px;
        }

        .loading-card {
            align-items: center;
            text-align: center;
            justify-content: center;
        }

        .loading-cloud {
            width: clamp(140px, 34vw, 200px);
            height: clamp(70px, 17vw, 100px);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-cloud::before {
            content: "☁️";
            font-size: clamp(80px, 18vw, 120px);
            animation: cloudFloat 2.5s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(17, 19, 34, 0.15));
        }

        .loading-drops {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .loading-drops span {
            width: 8px;
            height: 8px;
            background: #00D9FF;
            border-radius: 50%;
            animation: dropFall 1.2s ease-in infinite;
            box-shadow: 0 2px 8px rgba(0, 217, 255, 0.4);
        }

        .loading-drops span:nth-child(1) { animation-delay: 0s; background: #00D9FF; }
        .loading-drops span:nth-child(2) { animation-delay: 0.15s; background: #4ECDC4; }
        .loading-drops span:nth-child(3) { animation-delay: 0.3s; background: #00C2FF; }
        .loading-drops span:nth-child(4) { animation-delay: 0.45s; background: #95E1D3; }

        .loading-text {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 600;
        }

        .loading-sub {
            font-size: 1rem;
            color: var(--ink-soft);
        }

        .answer-card {
            text-align: left;
        }

        .answer {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            animation: answerPop 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .location {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--ink-soft);
        }

        .details {
            margin-top: 0.6rem;
            line-height: 1.6;
            color: var(--ink);
        }

        .detail-main {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .detail-secondary {
            font-size: 1rem;
            color: var(--ink-muted);
        }

        .brand-terminal {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            font-family: 'IBM Plex Mono', 'Space Grotesk', monospace;
            font-size: 0.95rem;
            text-transform: lowercase;
            letter-spacing: 0.05em;
            color: #0b0b0f;
            z-index: 2;
            text-decoration: none;
            padding-bottom: 0.15rem;
        }

        .brand-terminal:hover {
            color: #5b21b6;
        }

        .sparkle-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 20;
        }

        .sparkle-layer span {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            opacity: 0;
            animation: sparkle 1.1s ease-out forwards;
            box-shadow: 0 0 12px currentColor;
        }

        @keyframes drift {
            0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.7; }
            50% { transform: translate3d(0, -28px, 0) scale(1.05); opacity: 0.4; }
            100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.7; }
        }

        @keyframes cloudFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }

        @keyframes dropFall {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            70% {
                transform: translateY(50px) scale(0.8);
                opacity: 0.7;
            }
            100% {
                transform: translateY(60px) scale(0.5);
                opacity: 0;
            }
        }

        @keyframes answerPop {
            50% { opacity: 1; transform: translateY(-6px) scale(1.04); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes sparkle {
            0% { transform: scale(0.5) translateY(0); opacity: 0.9; }
            60% { transform: scale(1.1) translateY(-30px); opacity: 1; }
            100% { transform: scale(0.4) translateY(-60px); opacity: 0; }
        }

        @keyframes heroBreathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.01); }
        }

        @keyframes auroraShift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 0%; }
        }

        @keyframes gradientShift {
            0% { transform: rotate(0deg); background-position: 0% 50%; }
            50% { transform: rotate(180deg); background-position: 100% 50%; }
            100% { transform: rotate(360deg); background-position: 0% 50%; }
        }

        @media (max-width: 768px) {
            body {
                padding: 2rem 1.25rem 3.5rem;
            }

            .brand-terminal {
                position: static;
                margin-top: 2rem;
            }

            .card {
                min-height: 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="idle">
    <div class="floating-drops" aria-hidden="true">
        <span class="drop-1"></span>
        <span class="drop-2"></span>
        <span class="drop-3"></span>
        <span class="drop-4"></span>
    </div>
    <div class="container">
        <div id="content"></div>
    </div>
    <a class="brand-terminal" href="/" aria-label="isitgoingtorain home">isitgoingtorain.app</a>

    <script>
        const RAIN_THRESHOLD = {
            YES: 60,
            MAYBE_HIGH: 30
        };

        const ANSWER_LABELS = {
            YES: 'Yep!',
            MAYBE: 'Hmm',
            NO: 'Nope!'
        };

        const ANSWER_EMOJI = {
            YES: '☔',
            MAYBE: '🌥️',
            NO: '🌞'
        };

        const ANSWER_COPY = {
            YES: 'Grab the umbrella. Sky sounds serious.',
            MAYBE: 'Keep it close. Clouds are undecided.',
            NO: 'No rain on deck. Cruise.'
        };

        const content = document.getElementById('content');
        let isChecking = false;
        let errorTimeout = null;
        let magnetCleanup = null;

        const HERO_LINES = [
            'Stepping out? Let the sky answer first.',
            'Going somewhere? Ask the clouds before they gossip.',
            'Need umbrella odds in one syllable.',
            'Weather oracle, one button, zero scroll.',
            'Quick confidence check before you grab the keys.'
        ];

        function pickHeroLine() {
            return HERO_LINES[Math.floor(Math.random() * HERO_LINES.length)];
        }

        function renderIntro() {
            // Clear any pending error timeout
            if (errorTimeout) {
                clearTimeout(errorTimeout);
                errorTimeout = null;
            }

            // Clean up previous magnet listeners
            if (magnetCleanup) {
                magnetCleanup();
                magnetCleanup = null;
            }

            document.body.className = 'idle';
            const heroLine = pickHeroLine();

            content.innerHTML = `
                <div class="card hero-card">
                    <h1 class="hero-title">Is it going to rain?</h1>
                    <p class="hero-copy">
                        ${heroLine}
                    </p>
                    <button class="cta-button" id="checkButton">
                        <span>Let's check</span>
                    </button>
                </div>
            `;

            const button = document.getElementById('checkButton');
            button.addEventListener('click', startCheck, { once: true });
            magnetCleanup = setupMagnet(button);
        }

        function showLoading() {
            // Clear any pending error timeout
            if (errorTimeout) {
                clearTimeout(errorTimeout);
                errorTimeout = null;
            }

            // Clean up magnet listeners
            if (magnetCleanup) {
                magnetCleanup();
                magnetCleanup = null;
            }

            document.body.className = 'loading';
            content.innerHTML = `
                <div class="card loading-card">
                    <div class="loading-cloud" aria-hidden="true">
                        <div class="loading-drops">
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                    <p class="loading-text">Listening for clouds...</p>
                    <p class="loading-sub">Dialing wttr.in, hanging on the line.</p>
                </div>
            `;
        }

        async function getLocation() {
            const response = await fetch('https://ipinfo.io/json?token=demo');
            const data = await response.json();
            return {
                city: data.city || 'Unknown',
                country: data.country || '',
                lat: data.loc ? data.loc.split(',')[0] : null,
                lon: data.loc ? data.loc.split(',')[1] : null
            };
        }

        async function getWeather(city) {
            const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
            const data = await response.json();
            const current = data.current_condition[0];
            const today = data.weather[0];

            // Get the maximum chance of rain from today's hourly forecast
            const precipChance = Math.max(
                ...today.hourly.map(hour => parseInt(hour.chanceofrain || 0, 10))
            );

            return {
                precipChance,
                condition: current.weatherDesc[0].value,
                temp: current.temp_C
            };
        }

        function determineAnswer(precipChance) {
            if (precipChance >= RAIN_THRESHOLD.YES) {
                return 'YES';
            } else if (precipChance >= RAIN_THRESHOLD.MAYBE_HIGH) {
                return 'MAYBE';
            }
            return 'NO';
        }

        function renderAnswer(answer, location, weather) {
            document.body.className = answer.toLowerCase();

            const label = ANSWER_LABELS[answer];
            const emoji = ANSWER_EMOJI[answer];
            const vibeCopy = ANSWER_COPY[answer];
            const timestamp = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

            content.innerHTML = `
                <div class="card answer-card">
                    <div class="answer">${emoji} ${label}</div>
                    <p class="location">📍 ${location.city || 'Unknown'}${location.country ? ', ' + location.country : ''}</p>
                    <div class="details">
                        <p class="detail-main">${weather.precipChance}% chance · ${weather.condition} · ${weather.temp}°C</p>
                        <p class="detail-secondary">${vibeCopy} · Updated ${timestamp}</p>
                    </div>
                </div>
            `;

            triggerSparkles(answer.toLowerCase());
        }

        function showError(message) {
            // Clear any pending error timeout
            if (errorTimeout) {
                clearTimeout(errorTimeout);
                errorTimeout = null;
            }

            document.body.className = 'idle';
            content.innerHTML = `
                <div class="card error-card">
                    <div class="error">${message}</div>
                </div>
            `;
            errorTimeout = setTimeout(() => {
                errorTimeout = null;
                renderIntro();
            }, 2500);
        }

        async function startCheck() {
            if (isChecking) return;
            isChecking = true;
            showLoading();

            try {
                const location = await getLocation();
                if (!location.city) {
                    showError('Could not find your city. Toggle VPN off and retry.');
                    return;
                }

                const weather = await getWeather(location.city);
                const answer = determineAnswer(weather.precipChance);
                renderAnswer(answer, location, weather);
            } catch (error) {
                console.error('Error:', error);
                showError('Signal dropped. Try again?');
            } finally {
                isChecking = false;
            }
        }

        function setupMagnet(button) {
            const strength = 18;
            const onMove = (event) => {
                const rect = button.getBoundingClientRect();
                const moveX = (event.clientX - (rect.left + rect.width / 2)) / strength;
                const moveY = (event.clientY - (rect.top + rect.height / 2)) / strength;
                button.style.setProperty('--magnet-x', `${moveX}px`);
                button.style.setProperty('--magnet-y', `${moveY}px`);
            };

            const onReset = () => {
                button.style.setProperty('--magnet-x', '0px');
                button.style.setProperty('--magnet-y', '0px');
            };

            button.addEventListener('pointermove', onMove);
            ['pointerleave', 'pointerup', 'blur'].forEach((evt) => {
                button.addEventListener(evt, onReset);
            });

            // Return cleanup function
            return () => {
                button.removeEventListener('pointermove', onMove);
                ['pointerleave', 'pointerup', 'blur'].forEach((evt) => {
                    button.removeEventListener(evt, onReset);
                });
            };
        }

        function triggerSparkles(answer) {
            const palettes = {
                yes: ['#00D9FF', '#4ECDC4', '#FF6B6B', '#00C2FF'],
                maybe: ['#FFD93D', '#95E1D3', '#00D9FF', '#FFC93C'],
                no: ['#FFD93D', '#FF6B6B', '#FFC93C', '#FF5C8A']
            };

            const colors = palettes[answer] || palettes.maybe;
            const layer = document.createElement('div');
            layer.className = 'sparkle-layer';

            const sparkles = 16;
            for (let i = 0; i < sparkles; i++) {
                const dot = document.createElement('span');
                const size = Math.random() * 8 + 6;
                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                dot.style.left = `${45 + (Math.random() - 0.5) * 40}%`;
                dot.style.top = `${42 + (Math.random() - 0.5) * 34}%`;
                dot.style.color = colors[i % colors.length];
                dot.style.animationDelay = `${Math.random() * 0.2}s`;
                layer.appendChild(dot);
            }

            document.body.appendChild(layer);
            setTimeout(() => layer.remove(), 1300);
        }

        renderIntro();
    </script>
</body>
</html>
