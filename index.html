        const ANSWER_COPY = {
            YES: 'Grab the umbrella. Sky sounds serious.',
            MAYBE: 'Keep it close. Clouds are undecided.',
            NO: 'No rain on deck. Cruise.'
        };

        const content = document.getElementById('content');
        let isChecking = false;
        let errorTimeout = null;
        let magnetCleanup = null;
        let blinkInterval = null;

        const HERO_LINES = [
            'Stepping out? Let the sky answer first.',
            'Going somewhere? Ask the clouds before they gossip.',
            'Need umbrella odds in one syllable.',
            'Weather oracle, one button, zero scroll.',
            'Quick confidence check before you grab the keys.'
        ];

        function pickHeroLine() {
            return HERO_LINES[Math.floor(Math.random() * HERO_LINES.length)];
        }

        function blink() {
            const leftEye = document.querySelector('.cloud-eye-left');
            const rightEye = document.querySelector('.cloud-eye-right');

            if (!leftEye || !rightEye) return;

            // Add blinking class
            leftEye.classList.add('blinking');
            rightEye.classList.add('blinking');

            // Remove after blink duration
            setTimeout(() => {
                leftEye.classList.remove('blinking');
                rightEye.classList.remove('blinking');
            }, 150);
        }

        function startBlinking() {
            // Clear any existing interval
            if (blinkInterval) {
                clearInterval(blinkInterval);
            }

            // Blink randomly between 2-6 seconds
            const scheduleBlink = () => {
                const delay = 2000 + Math.random() * 4000;
                blinkInterval = setTimeout(() => {
                    blink();
                    scheduleBlink();
                }, delay);
            };

            scheduleBlink();
        }

        function stopBlinking() {
            if (blinkInterval) {
                clearTimeout(blinkInterval);
                blinkInterval = null;
            }
        }

        function renderIntro() {
            // Clear any pending error timeout
            if (errorTimeout) {
                clearTimeout(errorTimeout);
                errorTimeout = null;
            }

            // Clean up previous magnet listeners
            if (magnetCleanup) {
                magnetCleanup();
                magnetCleanup = null;
            }

            document.body.className = 'idle';
            const heroLine = pickHeroLine();

            content.innerHTML = `
                <div class="card hero-card">
                    <div class="hero-eyebrow">Weather Oracle</div>
                    <h1 class="hero-title">Is it going to rain?</h1>
                    <p class="hero-copy">
                        ${heroLine}
                    </p>

                    <button class="cloud-button" id="cloudButton" aria-label="Check the weather">
                        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" class="cloud-svg">
                            <defs>
                                <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#87CEEB" />
                                    <stop offset="50%" stop-color="#B8E6F5" />
                                    <stop offset="100%" stop-color="#FFFAED" />
                                </linearGradient>
                            </defs>

                            <!-- Cloud shape -->
                            <g class="cloud-body">
                                <path class="cloud-shape" fill="url(#cloudGradient)" stroke="#1a1625" stroke-width="3"
                                    d="M 100 150
                                       C 100 120, 120 100, 150 100
                                       C 160 70, 190 60, 220 70
                                       C 250 60, 280 80, 280 110
                                       C 310 110, 330 130, 330 160
                                       C 330 190, 310 210, 280 210
                                       L 120 210
                                       C 90 210, 70 190, 70 160
                                       C 70 145, 80 135, 100 150 Z" />

                                <!-- Left eye -->
                                <ellipse class="cloud-eye cloud-eye-left"
                                    cx="160" cy="140" rx="12" ry="20" fill="#1a1625" />

                                <!-- Right eye -->
                                <ellipse class="cloud-eye cloud-eye-right"
                                    cx="240" cy="140" rx="12" ry="20" fill="#1a1625" />
                            </g>
                        </svg>
                        <span class="cloud-label">Tap the cloud</span>
                    </button>
                </div>
            `;

            const cloudBtn = document.getElementById('cloudButton');
            cloudBtn.addEventListener('click', startCheck, { once: true });

            // Start blinking animation
            startBlinking();
        }

        function showLoading() {
            // Clear any pending error timeout
            if (errorTimeout) {
                clearTimeout(errorTimeout);
                errorTimeout = null;
            }

            // Clean up magnet listeners
            if (magnetCleanup) {
                magnetCleanup();
                magnetCleanup = null;
            }

            // Stop cloud blinking
            stopBlinking();

            document.body.className = 'loading';
            content.innerHTML = `
                <div class="card loading-card">
                    <div class="loading-cloud" aria-hidden="true">
                        <div class="loading-drops">
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                    <p class="loading-text">Listening for clouds...</p>
                    <p class="loading-sub">Dialing wttr.in, hanging on the line.</p>
                </div>
            `;
        }

        async function getLocation() {
            const response = await fetch('https://ipinfo.io/json?token=demo');
            const data = await response.json();
            return {
                city: data.city || 'Unknown',
                country: data.country || '',
                lat: data.loc ? data.loc.split(',')[0] : null,
                lon: data.loc ? data.loc.split(',')[1] : null
            };
        }

        async function getWeather(city) {
            const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
            const data = await response.json();
            const current = data.current_condition[0];
            const today = data.weather[0];
            const tomorrow = data.weather[1];

            // Get the maximum chance of rain from today's hourly forecast
            const precipChance = Math.max(
                ...today.hourly.map(hour => parseInt(hour.chanceofrain || 0, 10))
            );

            // Get tomorrow's max chance
            const tomorrowPrecipChance = Math.max(
                ...tomorrow.hourly.map(hour => parseInt(hour.chanceofrain || 0, 10))
            );

            return {
                precipChance,
                condition: current.weatherDesc[0].value,
                temp: current.temp_C,
                tomorrow: {
                    precipChance: tomorrowPrecipChance,
                    condition: tomorrow.hourly[4].weatherDesc[0].value, // noon forecast
                    maxTemp: tomorrow.maxtempC,
                    minTemp: tomorrow.mintempC
                }
            };
        }

        function determineAnswer(precipChance) {
            if (precipChance >= RAIN_THRESHOLD.YES) {
                return 'YES';
            } else if (precipChance >= RAIN_THRESHOLD.MAYBE_HIGH) {
                return 'MAYBE';
            }
            return 'NO';
        }

        function renderAnswer(answer, location, weather) {
            document.body.className = 'idle'; // Keep cream background

            const label = ANSWER_LABELS[answer];
            const emoji = ANSWER_EMOJI[answer];
            const vibeCopy = ANSWER_COPY[answer];
            const timestamp = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

            const tomorrowAnswer = determineAnswer(weather.tomorrow.precipChance);
            const tomorrowEmoji = ANSWER_EMOJI[tomorrowAnswer];

            content.innerHTML = `
                <div class="card answer-card">
                    <div class="answer">
                        <span class="emoji">${emoji}</span>
                        <span>${label}</span>
                    </div>
                    <p class="location">📍 ${location.city || 'Unknown'}${location.country ? ', ' + location.country : ''}</p>
                    <div class="details">
                        <p class="detail-main">${weather.precipChance}% chance · ${weather.condition} · ${weather.temp}°C</p>
                        <p class="detail-secondary">${vibeCopy} · Updated ${timestamp}</p>

                        <div class="tomorrow-pill">
                            <span>${tomorrowEmoji}</span>
                            <span>Tomorrow: ${weather.tomorrow.precipChance}% · ${weather.tomorrow.minTemp}-${weather.tomorrow.maxTemp}°C</span>
                        </div>
                    </div>

                    <div class="cta-group">
                        <button class="btn-secondary" id="checkAgainBtn">
                            <span>🔄</span>
                            <span>Check Again</span>
                        </button>
                        <button class="share-link" id="shareBtn">
                            <span>↗</span>
                            <span>Share Result</span>
                        </button>
                    </div>
                </div>
            `;

            // Add check again functionality
            document.getElementById('checkAgainBtn').addEventListener('click', () => {
                renderIntro();
            });

            // Add share functionality
            document.getElementById('shareBtn').addEventListener('click', async () => {
                const shareText = `${emoji} ${label} – ${weather.precipChance}% chance of rain in ${location.city}!\n\nCheck yours at isitgoingtorain.app`;

                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'Is it going to rain?',
                            text: shareText,
                            url: 'https://isitgoingtorain.app'
                        });
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            copyToClipboard(shareText);
                        }
                    }
                } else {
                    copyToClipboard(shareText);
                }
            });

            triggerSparkles(answer.toLowerCase());
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('shareBtn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<span>✓</span><span>Copied!</span>';
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                }, 2000);
            });
        }

        function showError(message) {
            // Clear any pending error timeout
            if (errorTimeout) {
                clearTimeout(errorTimeout);
                errorTimeout = null;
            }

            document.body.className = 'idle';
            content.innerHTML = `
                <div class="card error-card">
                    <div class="error">${message}</div>
                </div>
            `;
            errorTimeout = setTimeout(() => {
                errorTimeout = null;
                renderIntro();
            }, 2500);
        }

        async function startCheck() {
            if (isChecking) return;
            isChecking = true;
            showLoading();

            try {
                const location = await getLocation();
                if (!location.city) {
                    showError('Could not find your city. Toggle VPN off and retry.');
                    return;
                }

                const weather = await getWeather(location.city);
                const answer = determineAnswer(weather.precipChance);
                renderAnswer(answer, location, weather);
            } catch (error) {
                console.error('Error:', error);
                showError('Signal dropped. Try again?');
            } finally {
                isChecking = false;
            }
        }

        function setupMagnet(button) {
            const strength = 12; // Reduced from 18 for more subtle effect
            let rafId = null;

            const onMove = (event) => {
                if (rafId) return; // Throttle with RAF

                rafId = requestAnimationFrame(() => {
                    const rect = button.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const moveX = (event.clientX - centerX) / strength;
                    const moveY = (event.clientY - centerY) / strength;
                    button.style.setProperty('--magnet-x', `${moveX}px`);
                    button.style.setProperty('--magnet-y', `${moveY}px`);
                    rafId = null;
                });
            };

            const onReset = () => {
                button.style.setProperty('--magnet-x', '0px');
                button.style.setProperty('--magnet-y', '0px');
            };

            button.addEventListener('pointermove', onMove);
            ['pointerleave', 'pointerup', 'blur'].forEach((evt) => {
                button.addEventListener(evt, onReset);
            });

            // Return cleanup function
            return () => {
                if (rafId) cancelAnimationFrame(rafId);
                button.removeEventListener('pointermove', onMove);
                ['pointerleave', 'pointerup', 'blur'].forEach((evt) => {
                    button.removeEventListener(evt, onReset);
                });
            };
        }

        function triggerSparkles(answer) {
            const palettes = {
                yes: ['#00D9FF', '#4ECDC4', '#FF6B6B', '#00C2FF'],
                maybe: ['#FFD93D', '#95E1D3', '#00D9FF', '#FFC93C'],
                no: ['#FFD93D', '#FF6B6B', '#FFC93C', '#FF5C8A']
            };

            const colors = palettes[answer] || palettes.maybe;
            const layer = document.createElement('div');
            layer.className = 'sparkle-layer';

            const sparkles = 16;
            for (let i = 0; i < sparkles; i++) {
                const dot = document.createElement('span');
                const size = Math.random() * 8 + 6;
                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                dot.style.left = `${45 + (Math.random() - 0.5) * 40}%`;
                dot.style.top = `${42 + (Math.random() - 0.5) * 34}%`;
                dot.style.color = colors[i % colors.length];
                dot.style.animationDelay = `${Math.random() * 0.2}s`;
                layer.appendChild(dot);
            }

            document.body.appendChild(layer);
            setTimeout(() => layer.remove(), 1300);
        }

        renderIntro();
    </script>
</body>
</html>
